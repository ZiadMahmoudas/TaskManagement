<div class="min-h-screen bg-[#0f1117] flex items-center justify-center px-4 py-10 font-sans">
  <div class="w-full max-w-sm bg-[#161b27] border border-[#1e2535] rounded-2xl p-8">

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-7">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
      </div>
      <span class="text-[17px] font-semibold text-slate-100 tracking-tight">TaskFlow</span>
    </div>

    <!-- Tabs -->
    <div class="flex bg-[#1a2035] rounded-xl p-1 gap-1 mb-6">
          <button
        (click)="switchTab('register')"
        [class]="activeTab === 'register'
          ? 'flex-1 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium transition-all'
          : 'flex-1 py-2 rounded-lg text-slate-500 text-sm font-medium hover:text-slate-300 transition-all'">
        Create account
      </button>
      <button
        (click)="switchTab('login')"
        [class]="activeTab === 'login'
          ? 'flex-1 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium transition-all'
          : 'flex-1 py-2 rounded-lg text-slate-500 text-sm font-medium hover:text-slate-300 transition-all'">
        Sign in
      </button>
    
    </div>

    <!-- Error -->
    <div *ngIf="error" class="bg-red-950 border border-red-900 rounded-lg px-4 py-3 text-red-300 text-sm mb-5">
      {{ error }}
    </div>

    <!-- ───────── LOGIN FORM ───────── -->
    <form *ngIf="activeTab === 'login'" [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-4">

      <div>
        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">
          Username
        </label>
        <input
          formControlName="username"
          type="text"
          placeholder="Enter your username"
          class="w-full bg-[#1a2035] border border-[#1e2535] rounded-xl px-4 py-2.5 text-sm text-slate-100
                 placeholder-slate-600 outline-none focus:border-blue-600 transition-colors"/>
      </div>

      <div>
        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">
          Password
        </label>
        <div class="relative">
          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            class="w-full bg-[#1a2035] border border-[#1e2535] rounded-xl px-4 py-2.5 pr-11 text-sm text-slate-100
                   placeholder-slate-600 outline-none focus:border-blue-600 transition-colors"/>
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
            <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg *ngIf="showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full mt-2 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed
               text-white text-sm font-semibold rounded-xl transition-colors">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>

      <p class="text-center text-xs text-slate-500 pt-1">
        Don't have an account?
        <a (click)="switchTab('register')" class="text-blue-400 hover:underline cursor-pointer">Create one</a>
      </p>

    </form>

    <!-- ───────── REGISTER FORM ───────── -->
    <form *ngIf="activeTab === 'register'" [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-4">

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">
            Full name
          </label>
          <input
            formControlName="name"
            type="text"
            placeholder="Ahmed Mohamed"
            class="w-full bg-[#1a2035] border border-[#1e2535] rounded-xl px-4 py-2.5 text-sm text-slate-100
                   placeholder-slate-600 outline-none focus:border-blue-600 transition-colors"/>
        </div>
        <div>
          <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">
            Email
          </label>
          <input
            formControlName="email"
            type="email"
            placeholder="ahmed@mail.com"
            class="w-full bg-[#1a2035] border border-[#1e2535] rounded-xl px-4 py-2.5 text-sm text-slate-100
                   placeholder-slate-600 outline-none focus:border-blue-600 transition-colors"/>
        </div>
      </div>

      <div>
        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">
          Password
        </label>
        <div class="relative">
          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            class="w-full bg-[#1a2035] border border-[#1e2535] rounded-xl px-4 py-2.5 pr-11 text-sm text-slate-100
                   placeholder-slate-600 outline-none focus:border-blue-600 transition-colors"/>
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
            <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg *ngIf="showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
      </div>

      <div>
        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">
          Role
        </label>
        <div class="flex flex-wrap gap-2">
          <span
            *ngFor="let r of roles"
            (click)="registerForm.get('role')?.setValue(r.value)"
            [class]="registerForm.get('role')?.value === r.value
              ? 'px-4 py-1.5 rounded-lg text-xs font-medium cursor-pointer border border-blue-600 bg-blue-950 text-blue-300 transition-all'
              : 'px-4 py-1.5 rounded-lg text-xs font-medium cursor-pointer border border-[#1e2535] bg-[#1a2035] text-slate-500 hover:text-slate-300 hover:border-slate-600 transition-all'">
            {{ r.label }}
          </span>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full mt-2 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed
               text-white text-sm font-semibold rounded-xl transition-colors">
        {{ loading ? 'Creating…' : 'Create account' }}
      </button>

      <p class="text-center text-xs text-slate-500 pt-1">
        Already have an account?
        <a (click)="switchTab('login')" class="text-blue-400 hover:underline cursor-pointer">Sign in</a>
      </p>

    </form>

  </div>
</div>
